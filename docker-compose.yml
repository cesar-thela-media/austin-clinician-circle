# Austin Clinician Circle — Local Dev Stack
# Spins up: PostgreSQL + a minimal Next.js dev container
#
# Usage:
#   docker compose up -d          → start services
#   docker compose down           → stop services
#   docker compose down -v        → stop + wipe volumes (fresh DB)
#   docker compose logs -f app    → tail app logs

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: acc
      POSTGRES_PASSWORD: acc_dev_secret
      POSTGRES_DB: acc_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acc -d acc_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://acc:acc_dev_secret@db:5432/acc_dev
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-changeme_dev_only_32chars_minimum}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Add remaining secrets to .env.local — they are passed through here
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SARAH_EMAIL: ${SARAH_EMAIL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-acc-resources}
      NEXT_PUBLIC_CALENDLY_URL: ${NEXT_PUBLIC_CALENDLY_URL:-}
    volumes:
      - ./app:/app
      - /app/node_modules      # keep container's node_modules isolated
      - /app/.next             # keep container's build cache isolated
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
